<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НМТ Біологія - Підготовка 2025</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2d6a4f;
            --primary-light: #40916c;
            --secondary: #74c69d;
            --accent: #d8f3dc;
            --dark: #1b4332;
            --text: #212529;
            --bg: #f8f9fa;
            --card: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--dark) 0%, var(--primary) 100%);
            color: white;
            padding: 2rem 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-lg);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .header-subtitle {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        /* Progress Bar */
        .progress-container {
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 0.5rem;
            min-width: 200px;
        }

        .progress-bar {
            background: var(--secondary);
            height: 8px;
            border-radius: 10px;
            width: 0%;
            transition: width 0.5s ease;
        }

        .progress-text {
            font-size: 0.8rem;
            margin-top: 0.3rem;
            text-align: center;
        }

        /* Search */
        .search-box {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid var(--secondary);
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem 2rem;
        }

        /* Topic Cards */
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .topic-card {
            background: var(--card);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid var(--primary);
        }

        .topic-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .topic-card.completed {
            border-left-color: var(--secondary);
            background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
        }

        .topic-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .topic-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .topic-desc {
            color: #666;
            font-size: 0.9rem;
        }

        .topic-progress {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--primary-light);
            font-weight: 600;
        }

        /* Content View */
        .content-view {
            display: none;
            background: var(--card);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            animation: fadeIn 0.3s ease;
        }

        .content-view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-btn {
            background: var(--accent);
            color: var(--primary);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 1.5rem;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--secondary);
            color: white;
        }

        .theory-section {
            margin-bottom: 2rem;
        }

        .theory-section h3 {
            color: var(--primary);
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }

        .theory-section p, .theory-section ul {
            margin-bottom: 1rem;
            line-height: 1.8;
        }

        .theory-section ul {
            padding-left: 1.5rem;
        }

        .theory-section li {
            margin-bottom: 0.5rem;
        }

        .highlight-box {
            background: var(--accent);
            border-left: 4px solid var(--primary);
            padding: 1rem;
            border-radius: 0 8px 8px 0;
            margin: 1rem 0;
        }

        /* Quiz Section */
        .quiz-container {
            background: linear-gradient(135deg, var(--accent) 0%, #ffffff 100%);
            border-radius: 16px;
            padding: 2rem;
            margin-top: 2rem;
        }

        .quiz-question {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--dark);
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .quiz-option {
            background: white;
            border: 2px solid var(--secondary);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .quiz-option:hover {
            border-color: var(--primary);
            background: var(--accent);
        }

        .quiz-option.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .quiz-option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .quiz-option.disabled {
            pointer-events: none;
            opacity: 0.7;
        }

        .option-letter {
            background: var(--primary);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .quiz-result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            display: none;
        }

        .quiz-result.show {
            display: block;
        }

        .quiz-result.correct-result {
            background: #d4edda;
            color: #155724;
        }

        .quiz-result.incorrect-result {
            background: #f8d7da;
            color: #721c24;
        }

        .next-question-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 1rem;
            display: none;
        }

        .next-question-btn.show {
            display: inline-block;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }

        .stat-card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 1.4rem; }
            .topics-grid { grid-template-columns: 1fr; }
            .content-view { padding: 1rem; }
        }

        /* Hidden class */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div>
                <h1>🧬 НМТ Біологія 2025</h1>
                <div class="header-subtitle">Інтерактивна підготовка до тестування</div>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="mainProgress"></div>
                <div class="progress-text" id="progressText">0% вивчено</div>
            </div>
        </div>
    </header>

    <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Пошук тем (наприклад: мітоз, ДНК, фотосинтез)...">
    </div>

    <main class="container">
        <!-- Topics Grid -->
        <div class="topics-grid" id="topicsGrid">
            <!-- Generated by JS -->
        </div>

        <!-- Content View -->
        <div class="content-view" id="contentView">
            <button class="back-btn" onclick="showTopics()">← Назад до тем</button>
            <div id="contentBody"></div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="completedTopics">0</div>
                <div class="stat-label">Вивчено тем</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalQuestions">0</div>
                <div class="stat-label">Пройдено тестів</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="correctAnswers">0%</div>
                <div class="stat-label">Правильних відповідей</div>
            </div>
        </div>
    </main>

    <script>
        // Data Structure
        const topics = [
            {
                id: 'cell',
                icon: '🧫',
                title: 'Клітина',
                desc: 'Будова, органоїди, метаболізм',
                theory: `
                    <div class="theory-section">
                        <h3>1. Будова клітини</h3>
                        <p>Клітина — найменша одиниця живого, здатна до самостійного існування та розмноження. Розрізняють прокаріотичні (без ядра) та еукаріотичні (з ядром) клітини.</p>
                        
                        <div class="highlight-box">
                            <strong>Основні компоненти:</strong><br>
                            • Мембрана (фосфоліпідний бішар + білки)<br>
                            • Цитоплазма (цитозоль + органоїди)<br>
                            • Ядро (хроматин, ядерце, ядерна оболонка)
                        </div>

                        <h3>2. Органоїди еукаріотичної клітини</h3>
                        <ul>
                            <li><strong>Мітохондрії</strong> — енергетичні станції (АТФ, кребсовий цикл)</li>
                            <li><strong>Рибосоми</strong> — синтез білків (трансляція)</li>
                            <li><strong>ЕПР</strong> — синтез білків та ліпідів</li>
                            <li><strong>Апарат Гольджі</strong> — модифікація та сортування білків</li>
                            <li><strong>Лізосоми</strong> — травлення (гідролази)</li>
                            <li><strong>Пластиди</strong> (рослини): хлоропласти — фотосинтез, лейкопласти — запас речовин</li>
                            <li><strong>Вакуолі</strong> — підтримка тургору, депонування</li>
                            <li><strong>Цитоскелет</strong> — мікротрубочки та мікрофіламенти</li>
                        </ul>

                        <h3>3. Обмін речовин</h3>
                        <p><strong>Анаболізм:</strong> синтез складних речовин (фотосинтез, хемосинтез)</p>
                        <p><strong>Катаболізм:</strong> розпад речовин з виділенням енергії (гліколіз, бродіння, дихання)</p>

                    {
                        question: "Який органоїд відповідає за синтез АТФ в клітині?",

                        correct: 1,
                        explanation: "Мітохондрії — це енергетичні станції клітини, де відбувається синтез АТТ шляхом клітинного дихання."
                    },
                    {
                        question: "Яка різниця між прокаріотичною та еукаріотичною клітиною?",
                        options: ["Наявність цитоплазми", "Наявність мембрани", "Наявність ядра", "Наявність рибосом"],
                        correct: 2,
                        explanation: "Основна відмінність — наявність оформленого ядра в еукаріот та його відсутність у прокаріот."
                    },
                    {
                        question: "Де відбувається фотосинтез у рослинній клітині?",
                        options: ["В мітохондріях", "В хлоропластах", "В вакуолях", "В цитоплазмі"],
                        correct: 1,
                        explanation: "Фотосинтез відбувається в хлоропластах, які містять хлорофіл та фотосистеми."
                    }
                ]
            },
            {
                id: 'genetics',
                icon: '🧬',
                title: 'Генетика',
                desc: 'Закони Менделя, молекулярна генетика',
                theory: `
                    <div class="theory-section">
                        <h3>1. Закони Менделя</h3>
                        
                        <div class="highlight-box">
                            <strong>Перший закон (одноманітності):</strong> при схрещуванні гомозиготних батьків перше покоління гібридів одноманітне за фенотипом.
                        </div>

                        <div class="highlight-box">
                            <strong>Другий закон (розщеплення):</strong> при схрещуванні гетерозиготних особин у другому поколінні співвідношення фенотипів 3:1, генотипів 1:2:1.
                        </div>

                        <div class="highlight-box">
                            <strong>Третій закон (незалежного наслідування):</strong> гени різних алелейних пар успадковуються незалежно одна від одної (9:3:3:1 для дигібридів).
                        </div>

                        <h3>2. Молекулярні основи генетики</h3>
                        <ul>
                            <li><strong>ДНК:</strong> дезоксирибонуклеїнова кислота, подвійна спіраль, нуклеотиди (А-Т, Г-Ц)</li>
                            <li><strong>РНК:</strong> рибонуклеїнова кислота, один ланцюг, замість Т — Урацил (У)</li>
                            <li><strong>Реплікація:</strong> подвоєння ДНК (напівконсервативна)</li>
                            <li><strong>Транскрипція:</strong> синтез мРНК на матриці ДНК</li>
                            <li><strong>Трансляція:</strong> синтез білка на рибосомах</li>
                        </ul>

                        <h3>3. Мутації</h3>
                        <p><strong>Генні:</strong> заміна, втрата, вставка нуклеотидів</p>
                        <p><strong>Хромосомні:</strong> делеції, дуплікації, інверсії, транслокації</p>
                        <p><strong>Геномні:</strong> поліплоїдія, аннеплоїдія</p>
                    </div>
                `,
                quiz: [
                    {
                        question: "Яке співвідношення фенотипів у другому поколінні при моногібридному схрещуванні?",

                        correct: 1,

                    {

                        correct: 2,
                        explanation: "В ДНК аденін (А) з'єднується з тиміном (Т), а гуанін (Г) — з цитозином (Ц) водневими зв'язками."
                    },
                    {
                        question: "Який процес називається транскрипцією?",

                        correct: 2,
                        explanation: "Транскрипція — це синтез мРНК на матриці ДНК за участю РНК-полімерази."

            },
            {
                id: 'biotech',
                icon: '🔬',
                title: 'Біотехнології',
                desc: 'ПЦР, генна інженерія, клонування',

                        <ul>
                            <li><strong>Денатурація:</strong> 94-95°C, розрив водневих зв'язків</li>
                            <li><strong>Аннілінг:</strong> 50-65°C, з'єднання праймерів</li>

                        <p><strong>Репродуктивне:</strong> створення генетично ідентичної копії</p>

                        <p>Система редагування генома на основі бактеріального імунітету. Дозволяє точно вирізати та замінювати ділянки ДНК.</p>

                `,
                quiz: [
                    {
                        question: "Яка температура денатурації ДНК у ПЦР?",

                        explanation: "Денатурація (розділення ланцюгів) відбувається при 94-95°C."
                    },
                    {
                        question: "Що таке вектор у генній інженерії?",
                        options: ["Мікроскоп", "Носій генетичної інформації", "Бактерія", "Фермент"],
                        correct: 1,
                        explanation: "Вектор — це носій (плазміда, вірус), який використовується для перенесення чужорідного гену в клітину."
                    },
                    {
                        question: "Що таке CRISPR-Cas9?",
                        options: ["Вірус", "Антибіотик", "Система редагування генів", "Метод секвенування"],
                        correct: 2,
                        explanation: "CRISPR-Cas9 — це система редагування генома, що дозволяє точно змінювати послідовності ДНК."
                    }
                ]
            },
            {
                id: 'human',
                icon: '🫀',
                title: 'Людина та здоров\'я',
                desc: 'Анатомія, фізіологія, імунітет',
                theory: `
                    <div class="theory-section">
                        <h3>1. Серцево-судинна система</h3>
                        <p>Серце — порожнистий м'язовий орган з 4 камерами:</p>
                        <ul>
                            <li>Передсердя (праве та ліве) — прийом крові</li>
                            <li>Шлуночки (правий та лівий) — викид крові</li>
                        </ul>
                        <div class="highlight-box">
                            <strong>Мале коло:</strong> праве передсердя → правий шлуночок → легеневі артерії → легені → легеневі вени → ліве передсердя<br><br>

                    },

            totalQuestions: 0,
            correctAnswers: 0
        };

        // Initialize
        function init() {
            renderTopics();
            updateStats();
            updateProgress();
            
            // Search functionality
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                renderTopics(query);
            });
        }

        // Render Topics
        function renderTopics(searchQuery = '') {
            const grid = document.getElementById('topicsGrid');
            grid.innerHTML = '';
            
            const filtered = topics.filter(t => 
                t.title.toLowerCase().includes(searchQuery) || 
                t.desc.toLowerCase().includes(searchQuery) ||
                t.theory.toLowerCase().includes(searchQuery)
            );

            filtered.forEach(topic => {
                const isCompleted = userStats.completedTopics.includes(topic.id);
                const card = document.createElement('div');
                card.className = `topic-card ${isCompleted ? 'completed' : ''}`;
                card.onclick = () => openTopic(topic.id);
                
                card.innerHTML = `
                    <div class="topic-icon">${topic.icon}</div>
                    <div class="topic-title">${topic.title}</div>
                    <div class="topic-desc">${topic.desc}</div>
                    <div class="topic-progress">${isCompleted ? '✅ Вивчено' : '📖 Натисніть для вивчення'}</div>
                `;
                
                grid.appendChild(card);
            });
        }

        // Open Topic
        function openTopic(id) {
            currentTopic = topics.find(t => t.id === id);
            currentQuestion = 0;
            
            document.getElementById('topicsGrid').classList.add('hidden');
            document.getElementById('contentView').classList.add('active');
            
            renderContent();
        }

        // Render Content
        function renderContent() {
            const body = document.getElementById('contentBody');
            const topic = currentTopic;
            
            body.innerHTML = `
                <h2>${topic.icon} ${topic.title}</h2>
                ${topic.theory}
                <div class="quiz-container">
                    <h3>📝 Перевір себе</h3>
                    <div id="quizArea"></div>
                </div>
            `;
            
            renderQuiz();
        }

        // Render Quiz
        function renderQuiz() {
            const quizArea = document.getElementById('quizArea');
            const quiz = currentTopic.quiz[currentQuestion];
            
            if (!quiz) {
                // Quiz completed
                if (!userStats.completedTopics.includes(currentTopic.id)) {
                    userStats.completedTopics.push(currentTopic.id);
                    saveStats();
                }
                
                quizArea.innerHTML = `
                    <div class="highlight-box" style="text-align: center; font-size: 1.2rem;">
                        🎉 Вітаємо! Ви пройшли всі тести з теми "${currentTopic.title}"!
                    </div>
                    <button class="back-btn" onclick="showTopics()">Повернутися до тем</button>
                `;
                updateProgress();
                return;
            }
            
            quizArea.innerHTML = `
                <div class="quiz-question">Питання ${currentQuestion + 1}/${currentTopic.quiz.length}: ${quiz.question}</div>
                <div class="quiz-options" id="options">
                    ${quiz.options.map((opt, i) => `
                        <div class="quiz-option" onclick="checkAnswer(${i})">
                            <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                            <span>${opt}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="quiz-result" id="result"></div>
                <button class="next-question-btn" id="nextBtn" onclick="nextQuestion()">Наступне питання →</button>
            `;
        }

        // Check Answer
        function checkAnswer(selected) {
            const quiz = currentTopic.quiz[currentQuestion];
            const options = document.querySelectorAll('.quiz-option');
            const result = document.getElementById('result');
            const nextBtn = document.getElementById('nextBtn');
            
            userStats.totalQuestions++;
            
            options.forEach((opt, i) => {
                opt.classList.add('disabled');
                if (i === quiz.correct) {
                    opt.classList.add('correct');
                } else if (i === selected && i !== quiz.correct) {
                    opt.classList.add('incorrect');
                }
            });
            
            if (selected === quiz.correct) {
                userStats.correctAnswers++;
                result.className = 'quiz-result show correct-result';
                result.textContent = '✅ Правильно! ' + quiz.explanation;
            } else {
                result.className = 'quiz-result show incorrect-result';
                result.textContent = '❌ Неправильно. ' + quiz.explanation;
            }
            
            nextBtn.classList.add('show');
            saveStats();
            updateStats();
        }

        // Next Question
        function nextQuestion() {
            currentQuestion++;
            renderQuiz();
        }

        // Show Topics
        function showTopics() {
            document.getElementById('topicsGrid').classList.remove('hidden');
            document.getElementById('contentView').classList.remove('active');
            renderTopics(document.getElementById('searchInput').value.toLowerCase());
        }

        // Save Stats
        function saveStats() {
            localStorage.setItem('bioStats', JSON.stringify(userStats));
        }

        // Update Stats Display
        function updateStats() {
            document.getElementById('completedTopics').textContent = userStats.completedTopics.length;
            document.getElementById('totalQuestions').textContent = userStats.totalQuestions;
            
            const percentage = userStats.totalQuestions > 0 
                ? Math.round((userStats.correctAnswers / userStats.totalQuestions) * 100) 
                : 0;
            document.getElementById('correctAnswers').textContent = percentage + '%';
        }

        // Update Progress Bar
        function updateProgress() {
            const total = topics.length;
            const completed = userStats.completedTopics.length;
            const percent = Math.round((completed / total) * 100);
            
            document.getElementById('mainProgress').style.width = percent + '%';
            document.getElementById('progressText').textContent = `${percent}% вивчено (${completed}/${total} тем)`;
        }

        // Start
        init();
    </script>
